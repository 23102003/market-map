name: Update Market Map Data

on:
  push:
    paths:
      - '*.xlsx'
      - '*.XLSX'

jobs:
  update-map:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Find latest Excel file and run script
        run: |
          LATEST=$(ls -t *.xlsx *.XLSX 2>/dev/null | head -1)
          echo "Processing: $LATEST"
          python auto_populate_market_map.py --file "$LATEST"

      - name: Commit updated market_map_data.py
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add market_map_data.py market_map_data.xlsx market_map_log.txt
          git diff --staged --quiet || git commit -m "Auto-update market map data from $LATEST"
          git push
